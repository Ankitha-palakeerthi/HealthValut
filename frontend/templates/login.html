{% extends "layout.html" %}

{% block content %}
<div class="container" style="max-width: 500px; margin-top: 6rem;">
    <div class="card" style="border-top: 4px solid var(--primary); box-shadow: 0 0 30px rgba(139, 92, 246, 0.1);">
        <div style="text-align: center; margin-bottom: 2rem;">
            <div style="width: 60px; height: 60px; background: rgba(139, 92, 246, 0.1); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; color: var(--primary); margin: 0 auto 1.5rem; border: 1px solid var(--border-glow);">
                <i class="fas fa-lock"></i>
            </div>
            <h2 style="font-size: 1.8rem;">Welcome Back</h2>
            <p style="color: var(--text-dim); margin-top: 5px;">Login to access your health records.</p>
        </div>
        
        <form method="POST" action="{{ url_for('login') }}">
            <div class="form-group">
                <label style="color: var(--text-dim); font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1px;">Username</label>
                <input type="text" name="username" class="form-control" required style="margin-top: 8px;">
            </div>
            <div class="form-group">
                <label style="color: var(--text-dim); font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1px;">Password</label>
                <input type="password" name="password" class="form-control" required style="margin-top: 8px;">
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%; padding: 1rem; margin-top: 1rem; font-size: 1rem;">Login</button>
        </form>
        
        <p style="margin-top: 2rem; text-align: center; color: var(--text-dim); font-size: 0.9rem;">
            New to HealthVault? <a href="{{ url_for('register') }}" style="color: var(--primary); text-decoration: none; font-weight: 600;">Register Identity</a>
        </p>
    </div>
</div>
{% endblock %}
