{% extends "layout.html" %}

{% block content %}
<div class="container" style="text-align: center; max-width: 600px; margin-top: 6rem;">
    <div class="card" style="text-align: center; padding: 4rem 2rem; border: 1px solid var(--border-glow); box-shadow: 0 0 40px rgba(139, 92, 246, 0.2);">
        <div class="success-checkmark" style="margin-bottom: 2rem;">
            <div class="check-icon" style="margin: 0 auto; display: flex; align-items: center; justify-content: center; font-size: 2.5rem; color: #22c55e; border: 4px solid #22c55e; box-shadow: 0 0 20px #22c55e; width: 80px; height: 80px; border-radius: 50%;">
                <i class="fas fa-check"></i>
            </div>
        </div>
        <h2 style="font-size: 2rem; margin-bottom: 1rem;">Booking Confirmed</h2>
        <p style="color: var(--text-dim); margin-bottom: 3rem; font-size: 1.1rem;">Your appointment has been successfully confirmed and added to the registry.</p>
        
        <div style="background: rgba(139, 92, 246, 0.05); padding: 2rem; border-radius: 20px; text-align: left; margin-bottom: 3rem; border: 1px solid var(--border-glow);">
            <div style="display: flex; justify-content: space-between; margin-bottom: 1rem; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 1rem;">
                <span style="color: var(--text-dim);">Booking ID:</span>
                <strong style="color: var(--primary); font-family: monospace; font-size: 1.2rem;">{{ appt.booking_id }}</strong>
            </div>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                <div>
                    <p style="font-size: 0.8rem; color: var(--text-dim); text-transform: uppercase;">Appointment Date</p>
                    <p style="font-weight: 700; margin-top: 5px;">{{ appt.date }}</p>
                </div>
                <div>
                    <p style="font-size: 0.8rem; color: var(--text-dim); text-transform: uppercase;">Appointment Time</p>
                    <p style="font-weight: 700; margin-top: 5px;">{{ appt.time }}</p>
                </div>
            </div>
        </div>

        <div style="display: flex; gap: 1.5rem;">
            <a href="{{ url_for('patient_dashboard') }}" class="btn btn-primary" style="flex: 1; padding: 1rem;">Go to Dashboard</a>
            <a href="{{ url_for('download_slip', appointment_id=appt.id) }}" class="btn btn-outline" style="flex: 1; padding: 1rem; text-align: center; display: flex; align-items: center; justify-content: center;"><i class="fas fa-download" style="margin-right: 10px;"></i> Download Slip</a>
        </div>
    </div>
</div>
{% endblock %}
