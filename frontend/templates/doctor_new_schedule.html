{% extends "layout.html" %}

{% block content %}
<div class="container" style="margin-top:3rem; max-width:700px; overflow: visible;">
    <h2>New Schedule</h2>
    <form method="POST" style="margin-top:1rem; display:grid; gap:1rem;">
        <div>
            <label>Patient</label>
            <select name="patient_id" class="form-control" required>
                {% for p in patients %}
                <option value="{{ p.id }}">{{ p.name }}</option>
                {% endfor %}
            </select>
        </div>
        <div>
            <label>Date</label>
            <input type="date" name="date" class="form-control" required>
        </div>
        <div>
            <label>Time</label>
            <input type="time" name="time" class="form-control" required step="3600">
        </div>
        <div style="display:flex; gap:1rem;">
            <button class="btn btn-primary" type="submit">Add</button>
            <a class="btn btn-outline" href="{{ url_for('doctor_full_schedule') }}">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
