{% extends "layout.html" %}

{% block content %}
<div class="container" style="margin-top: 3rem;">
    <div style="display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 3rem;">
        <div>
            <h2 style="font-size: 2.2rem; margin-bottom: 0.5rem;">Account Settings</h2>
            <p style="color: var(--text-dim);">Update your profile and consultation fees.</p>
        </div>
    </div>

    <div class="dashboard-layout">
        <div class="sidebar">
            <a href="{{ url_for('doctor_dashboard') }}" class="sidebar-link"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
            <a href="#" class="sidebar-link"><i class="fas fa-calendar-alt"></i> Full Schedule</a>
            <a href="{{ url_for('doctor_patients') }}" class="sidebar-link"><i class="fas fa-user-injured"></i> Patients List</a>
            <a href="{{ url_for('doctor_analytics') }}" class="sidebar-link"><i class="fas fa-chart-pie"></i> View Analytics</a>
            <a href="{{ url_for('doctor_settings') }}" class="sidebar-link active"><i class="fas fa-cog"></i> Settings</a>
        </div>

        <div class="main-content">
            <div class="card" style="max-width: 800px;">
                <h3 style="margin-bottom: 2rem;"><i class="fas fa-user-edit" style="color: var(--primary);"></i> My Profile</h3>
                <form method="POST">
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; margin-bottom: 2rem;">
                        <div class="form-group">
                            <label style="color: var(--text-dim); margin-bottom: 0.5rem; display: block;">Full Name</label>
                            <input type="text" name="name" class="form-control" value="{{ doctor.name }}" required>
                        </div>
                        <div class="form-group">
                            <label style="color: var(--text-dim); margin-bottom: 0.5rem; display: block;">Specialization</label>
                            <input type="text" name="specialization" class="form-control" value="{{ doctor.specialization }}" required>
                        </div>
                    </div>
                    
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; margin-bottom: 2rem;">
                        <div class="form-group">
                            <label style="color: var(--text-dim); margin-bottom: 0.5rem; display: block;">Consultation Fee (₹)</label>
                            <input type="number" name="fee" class="form-control" value="{{ doctor.fee }}" required>
                        </div>
                        <div class="form-group">
                            <label style="color: var(--text-dim); margin-bottom: 0.5rem; display: block;">Experience (Years)</label>
                            <input type="number" name="experience" class="form-control" value="{{ doctor.experience }}" required>
                        </div>
                    </div>

                    <div class="form-group" style="margin-bottom: 2rem;">
                        <label style="color: var(--text-dim); margin-bottom: 0.5rem; display: block;">Clinic Location</label>
                        <input type="text" name="location" class="form-control" value="{{ doctor.location }}" required>
                    </div>

                    <div style="padding-top: 2rem; border-top: 1px solid rgba(255,255,255,0.05); text-align: right;">
                        <button type="submit" class="btn btn-primary" style="padding: 1rem 3rem;">Save Changes</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
