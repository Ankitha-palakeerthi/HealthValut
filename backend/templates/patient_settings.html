{% extends "layout.html" %}

{% block content %}
<div class="container" style="margin-top: 3rem;">
    <div style="display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 3rem;">
        <div>
            <h2 style="font-size: 2.2rem; margin-bottom: 0.5rem;">Profile Settings</h2>
            <p style="color: var(--text-dim);">Update your personal health profile and contact information.</p>
        </div>
    </div>

    <div class="dashboard-layout">
        <div class="sidebar">
            <a href="{{ url_for('patient_dashboard') }}" class="sidebar-link"><i class="fas fa-th-large"></i> Overview</a>
            <a href="{{ url_for('patient_dashboard') }}" class="sidebar-link"><i class="fas fa-calendar-check"></i> My Appointments</a>
            <a href="{{ url_for('patient_billing') }}" class="sidebar-link"><i class="fas fa-file-invoice-dollar"></i> Billing</a>
            <a href="{{ url_for('patient_settings') }}" class="sidebar-link active"><i class="fas fa-cog"></i> Settings</a>
        </div>

        <div class="main-content">
            <div class="card" style="max-width: 800px;">
                <h3 style="margin-bottom: 2rem;"><i class="fas fa-user-circle" style="color: var(--primary);"></i> Personal Profile</h3>
                <form method="POST">
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; margin-bottom: 2rem;">
                        <div class="form-group">
                            <label style="color: var(--text-dim); margin-bottom: 0.5rem; display: block;">Full Name</label>
                            <input type="text" name="name" class="form-control" value="{{ patient.name }}" required>
                        </div>
                        <div class="form-group">
                            <label style="color: var(--text-dim); margin-bottom: 0.5rem; display: block;">Age</label>
                            <input type="number" name="age" class="form-control" value="{{ patient.age or '' }}">
                        </div>
                    </div>
                    
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; margin-bottom: 2rem;">
                        <div class="form-group">
                            <label style="color: var(--text-dim); margin-bottom: 0.5rem; display: block;">Phone Number</label>
                            <input type="tel" name="phone" class="form-control" value="{{ patient.phone or '' }}">
                        </div>
                        <div class="form-group">
                            <label style="color: var(--text-dim); margin-bottom: 0.5rem; display: block;">Blood Group</label>
                            <select name="blood_group" class="form-control">
                                <option value="A+" {% if patient.blood_group == 'A+' %}selected{% endif %}>A+</option>
                                <option value="A-" {% if patient.blood_group == 'A-' %}selected{% endif %}>A-</option>
                                <option value="B+" {% if patient.blood_group == 'B+' %}selected{% endif %}>B+</option>
                                <option value="B-" {% if patient.blood_group == 'B-' %}selected{% endif %}>B-</option>
                                <option value="O+" {% if patient.blood_group == 'O+' %}selected{% endif %}>O+</option>
                                <option value="O-" {% if patient.blood_group == 'O-' %}selected{% endif %}>O-</option>
                                <option value="AB+" {% if patient.blood_group == 'AB+' %}selected{% endif %}>AB+</option>
                                <option value="AB-" {% if patient.blood_group == 'AB-' %}selected{% endif %}>AB-</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-group" style="margin-bottom: 2rem;">
                        <label style="color: var(--text-dim); margin-bottom: 0.5rem; display: block;">Medical Conditions</label>
                        <textarea name="conditions" class="form-control" rows="3">{{ patient.medical_conditions or '' }}</textarea>
                    </div>

                    <div style="padding-top: 2rem; border-top: 1px solid rgba(255,255,255,0.05); text-align: right;">
                        <button type="submit" class="btn btn-primary" style="padding: 1rem 3rem;">Update Profile</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
